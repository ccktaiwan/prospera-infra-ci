# 驗證:無機制驗證 ｜IP:創造性歸 Kevin(發明人), AI 為執行工具 (ADR-0032)
name: Prospera Codex Validation

on:
  workflow_call:

jobs:

  codex-validation:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Validate repository structure
        run: |

          required_dirs=(
            "00_GOVERNANCE"
            "01_ARCHITECTURE"
            "02_SPECIFICATIONS"
            "03_IMPLEMENTATION"
            "04_TESTING"
            "05_OPERATIONS"
          )

          for dir in "${required_dirs[@]}"
          do
            if [ ! -d "$dir" ]; then
              echo "Missing required directory: $dir"
              exit 1
            fi
          done

          echo "Repository structure validation passed."


      - name: Validate documentation metadata
        run: |

          files=$(find . -name "*.md")

          for file in $files
          do
            if grep -q "DOCUMENT TITLE:" "$file"; then
              echo "Metadata found in $file"
            else
              echo "Missing DOCUMENT TITLE in $file"
              exit 1
            fi
          done

          echo "Documentation metadata validation passed."


      - name: Validate commit message format
        run: |

          msg=$(git log -1 --pretty=%B)

          if [[ "$msg" =~ ^(DEFINE|UPDATE|FIX|DOCS|GOVERNANCE)\(.*\): ]]; then
            echo "Commit message format valid."
          else
            echo "Invalid commit message format."
            echo "Expected format:"
            echo "DEFINE(scope): message"
            exit 1
          fi


      - name: Codex validation complete
        run: |
          echo "Prospera Codex validation passed."
