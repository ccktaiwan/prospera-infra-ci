# ── Prospera SYSTEM HEADER (ADR-0032/SBOM) ──
# 性質:config ｜設計:Kevin 架構 ｜執行:AI 工具(claude.ai+Claude Code)
# 驗證:無機制驗證 ｜IP:創造性歸 Kevin(發明人), AI 為執行工具 (ADR-0032)
---
# yamllint disable rule:truthy
name: Governance Daily Sprint
"on":
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no side effects)'
        required: false
        default: 'false'
        type: string

jobs:
  daily-sprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prospera-ci-shared
        uses: actions/checkout@v4

      - name: Checkout prospera-agent-monitor
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ccktaiwan/prospera-agent-monitor
          token: ${{ secrets.PROSPERA_DASHBOARD_TOKEN }}
          path: prospera-agent-monitor

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q requests

      - name: Run auto_remediation
        continue-on-error: true
        env:
          GITHUB_REPO: ccktaiwan/prospera-agent-monitor
          PROSPERA_MCP_TOKEN: ${{ secrets.PROSPERA_MCP_TOKEN }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
        run: |
          cd prospera-agent-monitor
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python 02_kernel/auto_remediation.py $DRY_FLAG

      - name: Summary
        run: |
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "## Governance Daily Sprint Complete"
            echo "- Triggered: $TS"
            echo "- Dry run: ${{ inputs.dry_run || 'false' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send completion notification
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "Prospera OS Daily Sprint - ${{ job.status }}"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: Prospera OS
          body: |
            Sprint 完成時間：${{ github.run_id }}
            狀態：${{ job.status }}
            查看詳情：https://github.com/${{ github.repository }}/actions
