# ── Prospera SYSTEM HEADER (ADR-0032/SBOM) ──
# 性質:config ｜設計:Kevin 架構 ｜執行:AI 工具(claude.ai+Claude Code)
# 驗證:無機制驗證 ｜IP:創造性歸 Kevin(發明人), AI 為執行工具 (ADR-0032)
name: Artifact Semantic Check
on:
  pull_request:
    branches: [main]
jobs:
  semantic-check:
    if: ${{ !contains(github.event.head_commit.message, '[hold]') && !contains(github.ref, 'hold') }}  # PROSPERA_HOLD_GUARD ADR-0169
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROSPERA_DASHBOARD_TOKEN }}
          fetch-depth: 0   # gate-design 修正（ADR-0061）：需完整歷史以對 base 算 PR 真正改動
      - name: Fetch base
        run: git fetch origin main --quiet || true
      - name: Get changed files (vs base, PR 真正改動)
        id: changed
        run: |
          BASE=origin/main
          git diff --name-only "$BASE...HEAD" > changed_files.txt
          cat changed_files.txt
      - name: Extract phases from commit message (多 phase tag union)
        id: phase
        run: |
          MSG=$(git log --format=%B -n 1 ${{ github.event.pull_request.head.sha }})
          PHASES=$(echo "$MSG" | grep -oP '(?<=\[Phase)\d(?=\])' | sort -u | paste -sd, -)
          echo "phases=${PHASES:-4}" >> $GITHUB_OUTPUT
          echo "Detected phases: ${PHASES:-4}"
      - name: Phase Lock check
        run: |
          MSG=$(git log --format=%B -n 1 ${{ github.event.pull_request.head.sha }})
          if ! echo "$MSG" | grep -qE "\[Phase[0-6]\]"; then
            echo "FAIL PHASE LOCK VIOLATION: missing [PhaseN]"
            exit 1
          fi
          echo "OK Phase Lock OK"
      - name: Artifact semantic validation (多 phase union)
        run: |
          pip install -q --break-system-packages pathlib
          PHASES=${{ steps.phase.outputs.phases }}
          FAIL=0
          while IFS= read -r f; do
            if [[ "$f" == *.py ]] || [[ "$f" == *.json ]] || [[ "$f" == *.md ]]; then
              python scripts/artifact_semantic_validator.py "$f" --phases "$PHASES" || FAIL=1
            fi
          done < changed_files.txt
          exit $FAIL
      - name: Drift scan (changed-only, PR 真正改動的新增行)
        run: |
          python scripts/drift_scan.py --changed --base origin/main --fail-on-drift
