# ── Prospera SYSTEM HEADER (ADR-0032/SBOM) ──
# 性質:config ｜設計:Kevin 架構 ｜執行:AI 工具(claude.ai+Claude Code)
# 驗證:無機制驗證 ｜IP:創造性歸 Kevin(發明人), AI 為執行工具 (ADR-0032)
---
# yamllint disable rule:truthy
name: Governance Check (Validation)
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CONTRACT.md
        run: |
          if [ -f "CONTRACT.md" ]; then
            echo "✅ CONTRACT.md found"
          else
            echo "⚠️ CONTRACT.md missing — add to comply with ECOSYSTEM_DESIGN_v3.0"
          fi

      - name: Check no forbidden binaries
        run: |
          FOUND=$(find . -name "*.exe" -o -name "*.dll" -o -name "*.zip" \
            | grep -v ".git" | grep -v "99_archive" | head -5)
          if [ -n "$FOUND" ]; then
            echo "⚠️ Forbidden binaries found: $FOUND"
          else
            echo "✅ No forbidden binaries"
          fi

      - name: Governance summary
        run: |
          echo "## Governance Check (Validation Mode)" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: validation (non-blocking, enforce_admins=false)" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
